name: home-assistant
services:
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    user: "1002:100"
    volumes:
      - ${APPDATA_PATH}/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    #network_mode: service:homeassistant-tailscale-sidecar
#  homeassistant-tailscale-sidecar:
#    extends:
#      file: common.yaml
#      service: common-tailscale-sidecar
#    hostname: home
#    container_name: homeassistant-tailscale-sidecar
#    volumes:
#      - "${APPDATA_PATH}/tailscale_homeassistant_var_lib:/var/lib/tailscale"
#    networks: !override 
#      - lan-services
#      - host-bridge
  music-assistant-server:
    image: ghcr.io/music-assistant/server:latest # <<< Desired release version here (or use beta to get the latest beta version)
    container_name: music-assistant-server
    restart: unless-stopped
    # Network mode must be set to host for MA to work correctly
   # network_mode: host
    volumes:
      - ${APPDATA_PATH}/music-assistant-server/data:/data/
    # privileged caps (and security-opt) needed to mount smb folders within the container
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    environment:
      # Provide logging level as environment variable.
      # default=info, possible=(critical, error, warning, info, debug)
      - LOG_LEVEL=info
    #network_mode: service:homeassistant-tailscale-sidecar
    network_mode: host


