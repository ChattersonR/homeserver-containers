name: media-players
services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: "1000:1000"
#    ports:
#      - 8096:8096
    environment:
      - VIRTUAL_HOST=jellyfin
    volumes:
      - ${APPDATA_PATH}/jellyfin:/config
      - ${APPDATA_PATH}/jellyfin-cache:/cache
      - /srv/candyman-pool-1/media:/media
    restart: 'unless-stopped'
    #runtime: nvidia
    devices:
      - nvidia.com/gpu=all
#    deploy:
#      resources:
#        reservations:
#          devices:
#            - driver: cdi
#              device_ids:
#                - nvidia.com/gpu=all
    depends_on:
      - jellyfin-tailscale-sidecar
    network_mode: service:jellyfin-tailscale-sidecar
#    networks:
#      - services
  jellyfin-tailscale-sidecar:
    hostname: jellyfin
    container_name: jellyfin-tailscale-sidecar
    image: tailscale/tailscale:latest
    healthcheck:
      test: ["CMD-SHELL", "tailscale status"]
      interval: 1s
      timeout: 5s
      retries: 60
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY_SHARED}?ephemeral=false
      - TS_EXTRA_ARGS=--advertise-tags=tag:container,tag:shared
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/jellyfin.json
    volumes:
      - "${APPDATA_PATH}/tailscale_jellyfin_var_lib:/var/lib/tailscale"
      - "${APPDATA_PATH}/tailscale_jellyfin_config:/config"
    devices:
      - "/dev/net/tun:/dev/net/tun"
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped
    networks:
      - lan-services
#  audiobookshelf:
#    container_name: audiobookshelf
##    user: "1000:1000"
#    image: ghcr.io/advplyr/audiobookshelf:latest
#    environment:
#      - PORT=13378
#    # ABS runs on port 13378 by default. If you want to change
#    # the port, only change the external port, not the internal port
##    ports:
##      - 13378:80
#    volumes:
#      # These volumes are needed to keep your library persistent
#      # and allow media to be accessed by the ABS server.
#      # The path to the left of the colon is the path on your computer,
#      # and the path to the right of the colon is where the data is
#      # available to ABS in Docker.
#      # You can change these media directories or add as many as you want
#      - /srv/candyman-pool-1/media:/media
#      # The config directory needs to be on the same physical machine
#      # you are running ABS on
#      - ${APPDATA_PATH}/audiobookshelf:/config
#    network_mode: service:jellyfin-tailscale-sidecar
#    restart: unless-stopped
  kavita:
    container_name: kavita
#    user: "1000:1000"
    image: lscr.io/linuxserver/kavita:latest
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    # ABS runs on port 13378 by default. If you want to change
    # the port, only change the external port, not the internal port
#    ports:
#      - 5000:5000
    volumes:
      # These volumes are needed to keep your library persistent
      # and allow media to be accessed by the ABS server.
      # The path to the left of the colon is the path on your computer,
      # and the path to the right of the colon is where the data is
      # available to ABS in Docker.
      # You can change these media directories or add as many as you want
      - /srv/candyman-pool-1/media:/media
      # The config directory needs to be on the same physical machine
      # you are running ABS on
      - ${APPDATA_PATH}/kavita:/config
    network_mode: service:jellyfin-tailscale-sidecar
    restart: unless-stopped

networks:
  lan-services:
    name: lan-services
    external: true
    # Optional - alternative address used for autodiscovery
    #environment:
    #  - JELLYFIN_PublishedServerUrl=http://example.com
    # Optional - may be necessary for docker healthcheck to pass if running in host network mode
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
