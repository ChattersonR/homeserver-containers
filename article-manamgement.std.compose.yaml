name: article-management
services:
  wallabag:
    image: wallabag/wallabag
    container_name: wallabag
#    user: "1002:1000"
#    ports:
#      - 8096:8096
    environment:
      #- MYSQL_ROOT_PASSWORD=wallaroot
      #- SYMFONY__ENV__DATABASE_DRIVER=pdo_mysql
      #- SYMFONY__ENV__DATABASE_HOST=db
      #- SYMFONY__ENV__DATABASE_PORT=3306
      #- SYMFONY__ENV__DATABASE_NAME=wallabag
      #- SYMFONY__ENV__DATABASE_USER=wallabag
      #- SYMFONY__ENV__DATABASE_PASSWORD=wallapass
      #- SYMFONY__ENV__DATABASE_CHARSET=utf8mb4
      #- SYMFONY__ENV__DATABASE_TABLE_PREFIX="wallabag_"
      #- SYMFONY__ENV__MAILER_DSN=smtp://127.0.0.1
      #- SYMFONY__ENV__FROM_EMAIL=wallabag@example.com
      - SYMFONY__ENV__DOMAIN_NAME=http://wallabag/
      #- SYMFONY__ENV__SERVER_NAME="Your wallabag instance"
    volumes:
      - ${APPDATA_PATH}/wallabag/images:/var/www/wallabag/web/assets/images
      - ${APPDATA_PATH}/wallabag/data:/var/www/wallabag/data
    healthcheck:
      test: ["CMD", "wget" ,"--no-verbose", "--tries=1", "--spider", "http://localhost/api/info"]
      interval: 1m
      timeout: 3s 
    restart: 'unless-stopped'
    depends_on:
      - wallabag-tailscale-sidecar
    network_mode: service:wallabag-tailscale-sidecar
  wallabag-tailscale-sidecar:
    extends:
      file: common.yaml
      service: common-tailscale-sidecar
    hostname: wallabag
    container_name: wallabag-tailscale-sidecar
    volumes:
      - "${APPDATA_PATH}/tailscale_wallabag_var_lib:/var/lib/tailscale"

  linkding:
    container_name: linkding
    image: sissbruecker/linkding:latest
#    ports:
#      - 80
    volumes:
      - "${APPDATA_PATH}/linkding/data:/etc/linkding/data"
    environment:
      # Port on the host system that the application should be published on
      - LD_HOST_PORT=80
      # Directory on the host system that should be mounted as data dir into the Docker container
      - LD_HOST_DATA_DIR=./data
    restart: unless-stopped
    depends_on:
      - linkding-tailscale-sidecar
    network_mode: service:linkding-tailscale-sidecar
  linkding-tailscale-sidecar:
    extends:
      file: common.yaml
      service: common-tailscale-sidecar
    hostname: linkding
    container_name: linkding-tailscale-sidecar
    volumes:
      - "${APPDATA_PATH}/tailscale_linkding_var_lib:/var/lib/tailscale"

  mealie:
    image: ghcr.io/mealie-recipes/mealie:v2.4.1 #
    container_name: mealie
    restart: unless-stopped
#    ports:
#        - "9925:9000" #
    deploy:
      resources:
        limits:
          memory: 1000M #
    volumes:
      - ${APPDATA_PATH}/mealie:/app/data/
    environment:
      # Set Backend ENV Variables Here
      ALLOW_SIGNUP: "false"
      PUID: 1002
      PGID: 1002
      TZ: America/New York
      BASE_URL: http://mealie
    depends_on:
      - mealie-tailscale-sidecar
    network_mode: service:mealie-tailscale-sidecar
  mealie-tailscale-sidecar:
    extends:
      file: common.yaml
      service: common-tailscale-sidecar
    hostname: mealie
    container_name: mealie-tailscale-sidecar
    volumes:
      - "${APPDATA_PATH}/tailscale_mealie_var_lib:/var/lib/tailscale"

networks:
  services:
    name: services
    external: true
    # Optional - alternative address used for autodiscovery
    #environment:
    #  - JELLYFIN_PublishedServerUrl=http://example.com
    # Optional - may be necessary for docker healthcheck to pass if running in host network mode
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
